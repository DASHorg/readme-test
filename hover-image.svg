<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <style>
    /* Instant hover style for the tooltip container */
    .tooltip {
      opacity: 0;
      transition: opacity 0.1s ease-in-out;
      pointer-events: none;
    }
    svg:hover .tooltip {
      opacity: 1;
    }
  </style>

  <!-- 1. Your Main Image -->
  <!-- Replace href with your actual image URL or relative repository path -->
  <image href="https://www.temp-image.com/ib/oDDrcwNTngTLOBu_1778929729.png" x="0" y="0" width="500" height="500" />

  <!-- 2. Your Custom Tooltip -->
  <g class="tooltip">
    <!-- Tooltip Background Box -->
    <rect x="20" y="240" width="460" height="40" rx="5" fill="black" opacity="0.8" />
    <!-- Tooltip Text -->
    <text x="250" y="265" fill="white" font-family="sans-serif" font-size="16" text-anchor="middle">
      Postgresql
    </text>
  </g>
</svg>
